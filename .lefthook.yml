# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  commands:
    go-vet:
      run: go vet ./...
    go-test:
      run: go test ./... -count=1 -timeout=30s
    frontend-test:
      root: "frontend/"
      glob: "frontend/**/*"
      run: npm run test:run

pre-push:
  commands:
    go-build:
      run: go build ./...
